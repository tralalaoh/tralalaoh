<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unified Search UI - With Autocomplete</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

  :root {
    --bg-dark: #0a0a0c;
    --glass-heavy: rgba(18, 16, 21, 0.9);
    --glass-border: rgba(255, 255, 255, 0.08);
    --text-main: #f5f5f5;
    --text-muted: #9ca3af;
    --focus-bg: #ffffff;
    --focus-text: #121015;
    --accent-yellow: #facc15;
    --radius-md: 8px;
    --radius-lg: 16px;
    --radius-xl: 32px;
  }

  body {
    margin: 0;
    height: 100vh;
    font-family: 'Inter', sans-serif;
    color: var(--text-main);
    overflow: hidden;
    background-color: var(--bg-dark);
  }

  /* Blurred Background */
  .blurred-bg {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background-image: url('https://images.unsplash.com/photo-1536440136628-849c177e76a1?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');
    background-size: cover;
    background-position: center;
    filter: blur(20px) brightness(0.6);
    transform: scale(1.05);
    z-index: 1;
  }

  /* Main Search Dialog */
  .search-dialog {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 1200px;
    display: flex;
    background: var(--glass-heavy);
    backdrop-filter: blur(40px);
    -webkit-backdrop-filter: blur(40px);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-xl);
    box-shadow: 0 30px 80px rgba(0,0,0,0.8);
    z-index: 10;
    overflow: hidden;
    animation: zoomIn 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
  }

  @keyframes zoomIn {
    from { opacity: 0; transform: translate(-50%, -50%) scale(0.95); }
    to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  }

  /* Left Side: Keyboard and Input */
  .keyboard-section {
    width: 750px;
    padding: 30px 40px;
    display: flex;
    flex-direction: column;
  }

  .search-header {
    display: flex;
    align-items: center;
    gap: 15px;
    margin-bottom: 25px;
  }

  .search-icon { font-size: 24px; color: var(--text-muted); }
  .search-header h1 { margin: 0; font-size: 22px; font-weight: 600; }

  .input-wrapper {
    width: 100%;
    box-sizing: border-box;
    background: rgba(0,0,0,0.3);
    border-radius: var(--radius-lg);
    border: 2px solid transparent;
    padding: 18px 20px;
    font-size: 24px;
    color: #fff;
    margin-bottom: 15px; /* Reduced to make room for autocomplete */
    transition: 0.2s;
    display: flex;
    align-items: center;
  }

  .input-wrapper.focused {
    border-color: var(--accent-yellow);
  }

  .input-cursor {
    width: 2px;
    height: 28px;
    background: var(--accent-yellow);
    animation: blink 1s infinite;
    margin-left: 2px;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  /* --- NEW: Autocomplete Suggestion Bar --- */
  .autocomplete-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 25px;
    overflow: hidden;
    height: 44px;
    align-items: center;
  }

  .suggestion {
    padding: 10px 20px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-xl); /* Pill shape */
    font-size: 15px;
    font-weight: 500;
    color: var(--text-main);
    white-space: nowrap;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .suggestion:hover, .suggestion.focused {
    background: var(--focus-bg);
    color: var(--focus-text);
    font-weight: 700;
    transform: scale(1.05);
  }
  /* ---------------------------------------- */

  /* Keyboard Grid */
  .keyboard {
    display: grid;
    grid-template-columns: repeat(14, 1fr);
    gap: 10px;
  }

  .key {
    height: 50px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 18px;
    font-weight: 500;
    color: var(--text-muted);
    border-radius: var(--radius-md);
    background: rgba(255, 255, 255, 0.02);
    cursor: pointer;
    transition: all 0.2s ease;
  }

  /* UNIFIED WHITE PILL FOCUS STATE */
  .key:hover, .key.focused {
    background: var(--focus-bg);
    color: var(--focus-text);
    transform: scale(1.05);
    font-weight: 700;
    box-shadow: 0 4px 15px rgba(255,255,255,0.2);
  }

  /* Special Keys */
  .key.space { grid-column: 5 / span 6; }
  .key.caps { grid-column: span 2; }
  .key.backspace { grid-column: span 2; }

  /* Right Side: Live Search Results */
  .results-section {
    flex: 1;
    background: rgba(0,0,0,0.3);
    border-left: 1px solid var(--glass-border);
    padding: 30px;
    opacity: 0;
    transition: opacity 0.3s ease-in-out;
  }

  .results-section.has-results {
    opacity: 1;
  }

  .results-header {
    font-size: 14px;
    font-weight: 700;
    color: var(--accent-yellow);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 20px;
  }

  .result-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .result-item {
    display: flex;
    align-items: center;
    gap: 15px;
    padding: 10px;
    border-radius: var(--radius-md);
    cursor: pointer;
    transition: 0.2s;
  }

  .result-item:hover, .result-item.focused {
    background: rgba(255,255,255,0.1);
    transform: translateX(5px);
  }

  .result-poster {
    width: 45px;
    height: 67px;
    border-radius: 6px;
    background-color: #333;
    background-size: cover;
  }

  .result-title { font-size: 16px; font-weight: 600; }
  .result-year { font-size: 14px; color: var(--text-muted); }

</style>
</head>
<body>

<div class="blurred-bg"></div>

<!-- Unified Search Dialog -->
<div class="search-dialog">

  <!-- Left Side: Keyboard -->
  <div class="keyboard-section">
    <div class="search-header">
      <span class="search-icon">🔍</span>
      <h1>New Search</h1>
    </div>

    <!-- Search Input -->
    <div class="input-wrapper" id="search-input">
      <span id="search-text">Juju</span>
      <div class="input-cursor"></div>
    </div>

    <!-- NEW: Autocomplete Bar -->
    <div class="autocomplete-bar" id="autocomplete-bar">
      <div class="suggestion focused">Jujutsu Kaisen</div>
      <div class="suggestion">Jumanji</div>
      <div class="suggestion">Juliet</div>
      <div class="suggestion">Jupiter Ascending</div>
    </div>

    <!-- Keyboard -->
    <div class="keyboard">
      <!-- Row 1 -->
      <div class="key">1</div> <div class="key">2</div> <div class="key">3</div> <div class="key">4</div> <div class="key">5</div> <div class="key">6</div> <div class="key">7</div> <div class="key">8</div> <div class="key">9</div> <div class="key">0</div>
      <div class="key">-</div> <div class="key">=</div> <div class="key backspace">⌫</div>
      <!-- Row 2 -->
      <div class="key">q</div> <div class="key">w</div> <div class="key">e</div> <div class="key">r</div> <div class="key">t</div> <div class="key">y</div> <div class="key">u</div> <div class="key">i</div> <div class="key">o</div> <div class="key">p</div>
      <div class="key">[</div> <div class="key">]</div> <div class="key">\</div>
      <!-- Row 3 -->
      <div class="key caps">⇪</div>
      <div class="key">a</div> <div class="key">s</div> <div class="key">d</div> <div class="key">f</div> <div class="key">g</div> <div class="key">h</div> <div class="key">j</div> <div class="key">k</div> <div class="key">l</div>
      <div class="key">;</div> <div class="key">'</div>
      <!-- Row 4 -->
      <div class="key">⇧</div>
      <div class="key">z</div> <div class="key">x</div> <div class="key">c</div> <div class="key">v</div> <div class="key">b</div> <div class="key">n</div> <div class="key">m</div>
      <div class="key">,</div> <div class="key">.</div> <div class="key">/</div>
      <div class="key">Done</div>
      <!-- Row 5 -->
      <div class="key">...</div> <div class="key">@</div> <div class="key space">Space</div> <div class="key">←</div> <div class="key">→</div>
    </div>
  </div>

  <!-- Right Side: Live Results -->
  <div class="results-section has-results">
    <div class="results-header">Results for "Juju..."</div>
    <div class="result-list">
      <div class="result-item">
        <div class="result-poster" style="background-image: url('https://images.unsplash.com/photo-1607604276583-eef5d076aa5f?ixlib=rb-4.0.3&auto=format&fit=crop&w=100&q=80')"></div>
        <div>
          <div class="result-title">Jujutsu Kaisen</div>
          <div class="result-year">2020 • TV Series</div>
        </div>
      </div>
      <div class="result-item">
        <div class="result-poster" style="background-image: url('https://images.unsplash.com/photo-1578632767115-351597cf2477?ixlib=rb-4.0.3&auto=format&fit=crop&w=100&q=80')"></div>
        <div>
          <div class="result-title">Jujutsu Kaisen 0</div>
          <div class="result-year">2021 • Movie</div>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
  const keys = document.querySelectorAll('.key');
  const suggestions = document.querySelectorAll('.suggestion');
  const searchTextEl = document.getElementById('search-text');
  const resultsHeader = document.querySelector('.results-header');

  // Function to remove focus from all elements (keyboard + autocomplete)
  function clearAllFocus() {
    keys.forEach(k => k.classList.remove('focused'));
    suggestions.forEach(s => s.classList.remove('focused'));
  }

  // Keyboard interaction logic
  keys.forEach(key => {
    key.addEventListener('mouseover', () => {
      clearAllFocus();
      key.classList.add('focused');
    });

    key.addEventListener('click', () => {
      let currentText = searchTextEl.innerText;
      const keyText = key.innerText;

      if(keyText.length === 1) {
        searchTextEl.innerText = currentText + keyText;
      } else if (keyText === '⌫') {
        searchTextEl.innerText = currentText.slice(0, -1);
      } else if (keyText === 'Space') {
        searchTextEl.innerText += ' ';
      }

      resultsHeader.innerText = `Results for "${searchTextEl.innerText}..."`;
      document.querySelector('.results-section').classList.add('has-results');
    });
  });

  // Autocomplete interaction logic
  suggestions.forEach(suggestion => {
    suggestion.addEventListener('mouseover', () => {
      clearAllFocus();
      suggestion.classList.add('focused');
    });

    suggestion.addEventListener('click', () => {
      // Auto-fill the search text with the clicked suggestion
      searchTextEl.innerText = suggestion.innerText;
      resultsHeader.innerText = `Results for "${suggestion.innerText}"`;
      document.querySelector('.results-section').classList.add('has-results');

      // Flash input box green/yellow to indicate successful autocomplete
      const inputWrapper = document.getElementById('search-input');
      inputWrapper.style.borderColor = 'var(--accent-yellow)';
      setTimeout(() => { inputWrapper.style.borderColor = 'transparent'; }, 400);
    });
  });
</script>

</body>
</html>
