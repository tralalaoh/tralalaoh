<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unified Standard Keyboard UI - With Autocomplete</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

  :root {
    --bg-dark: #0a0a0c;
    --glass-heavy: rgba(18, 16, 21, 0.95);
    --glass-border: rgba(255, 255, 255, 0.08);
    --text-main: #f5f5f5;
    --text-muted: #9ca3af;
    --focus-bg: #ffffff;
    --focus-text: #121015;
    --accent-yellow: #facc15;
    --accent-red: #ef4444;
    --accent-green: #10b981;
    --radius-md: 10px;
    --radius-lg: 16px;
    --radius-xl: 32px;
  }

  body {
    margin: 0;
    height: 100vh;
    font-family: 'Inter', sans-serif;
    color: var(--text-main);
    overflow: hidden;
    background-color: var(--bg-dark);
  }

  /* Blurred Background */
  .blurred-bg {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background-image: url('https://images.unsplash.com/photo-1536440136628-849c177e76a1?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');
    background-size: cover;
    background-position: center;
    filter: blur(25px) brightness(0.5);
    transform: scale(1.05);
    z-index: 1;
  }

  /* Centered Standard Keyboard Dialog */
  .keyboard-dialog {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 850px;
    background: var(--glass-heavy);
    backdrop-filter: blur(40px);
    -webkit-backdrop-filter: blur(40px);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-xl);
    box-shadow: 0 40px 100px rgba(0,0,0,0.9);
    z-index: 10;
    padding: 40px 50px;
    display: flex;
    flex-direction: column;
    animation: zoomIn 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
  }

  @keyframes zoomIn {
    from { opacity: 0; transform: translate(-50%, -45%) scale(0.95); }
    to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  }

  .dialog-header {
    display: flex;
    align-items: center;
    gap: 15px;
    margin-bottom: 25px;
  }

  .dialog-icon { font-size: 26px; color: var(--accent-yellow); }
  .dialog-header h1 { margin: 0; font-size: 24px; font-weight: 600; letter-spacing: -0.5px; }

  /* Input Field */
  .input-wrapper {
    width: 100%;
    box-sizing: border-box;
    background: rgba(0,0,0,0.4);
    border-radius: var(--radius-lg);
    border: 2px solid transparent;
    padding: 22px 25px;
    font-size: 28px;
    font-weight: 500;
    color: #fff;
    margin-bottom: 15px; /* Reduced to fit autocomplete */
    transition: 0.2s;
    display: flex;
    align-items: center;
  }

  .input-wrapper.active-typing {
    border-color: var(--accent-yellow);
    box-shadow: 0 0 20px rgba(250, 204, 21, 0.1);
  }

  .input-cursor {
    width: 3px;
    height: 32px;
    background: var(--accent-yellow);
    animation: blink 1s infinite;
    margin-left: 4px;
    border-radius: 2px;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  /* --- Autocomplete Suggestion Bar --- */
  .autocomplete-bar {
    display: flex;
    justify-content: center; /* Centered for this dialog layout */
    gap: 10px;
    margin-bottom: 25px;
    overflow: hidden;
    height: 44px;
    align-items: center;
  }

  .suggestion {
    padding: 10px 20px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-xl); /* Pill shape */
    font-size: 15px;
    font-weight: 500;
    color: var(--text-main);
    white-space: nowrap;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .suggestion:hover, .suggestion.focused {
    background: var(--focus-bg);
    color: var(--focus-text);
    font-weight: 700;
    transform: scale(1.05);
  }

  /* Keyboard Grid */
  .keyboard {
    display: grid;
    grid-template-columns: repeat(14, 1fr);
    gap: 12px;
  }

  .key {
    height: 56px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 20px;
    font-weight: 500;
    color: var(--text-muted);
    border-radius: var(--radius-md);
    background: rgba(255, 255, 255, 0.03);
    cursor: pointer;
    transition: all 0.2s ease;
    user-select: none;
  }

  /* UNIFIED WHITE PILL FOCUS STATE */
  .key:hover, .key.focused {
    background: var(--focus-bg);
    color: var(--focus-text);
    transform: scale(1.05);
    font-weight: 700;
    box-shadow: 0 6px 20px rgba(255,255,255,0.15);
    z-index: 2;
  }

  /* Special Keys Sizing */
  .key.space { grid-column: 4 / span 6; }
  .key.caps { grid-column: span 2; }
  .key.backspace { grid-column: span 2; }

  /* Action Keys (Done, Cancel, Clear) */
  .key.action-done { grid-column: span 3; color: var(--accent-green); font-weight: 600; }
  .key.action-done:hover, .key.action-done.focused { background: var(--accent-green); color: #fff; }

  .key.action-cancel { grid-column: span 2; color: var(--accent-red); font-weight: 600; }
  .key.action-cancel:hover, .key.action-cancel.focused { background: var(--accent-red); color: #fff; }

  .key.action-clear { color: var(--accent-yellow); font-weight: 600; }
  .key.action-clear:hover, .key.action-clear.focused { background: var(--accent-yellow); color: #121015; }

</style>
</head>
<body>

<div class="blurred-bg"></div>

<!-- Standard Keyboard Dialog -->
<div class="keyboard-dialog" id="dialog-window">

  <div class="dialog-header">
    <span class="dialog-icon">✏️</span>
    <h1>Rename Profile</h1>
  </div>

  <!-- Main Input -->
  <div class="input-wrapper" id="text-input">
    <span id="input-text">Living R</span>
    <div class="input-cursor"></div>
  </div>

  <!-- Autocomplete Bar -->
  <div class="autocomplete-bar" id="autocomplete-bar">
    <div class="suggestion focused">Living Room</div>
    <div class="suggestion">Living Area</div>
    <div class="suggestion">Lounge</div>
  </div>

  <!-- Centered Keyboard -->
  <div class="keyboard">
    <!-- Row 1 -->
    <div class="key">1</div> <div class="key">2</div> <div class="key">3</div> <div class="key">4</div> <div class="key">5</div> <div class="key">6</div> <div class="key">7</div> <div class="key">8</div> <div class="key">9</div> <div class="key">0</div>
    <div class="key">-</div> <div class="key">=</div> <div class="key backspace">⌫</div>

    <!-- Row 2 -->
    <div class="key">q</div> <div class="key">w</div> <div class="key">e</div> <div class="key">r</div> <div class="key">t</div> <div class="key">y</div> <div class="key">u</div> <div class="key">i</div> <div class="key">o</div> <div class="key">p</div>
    <div class="key">[</div> <div class="key">]</div> <div class="key action-clear" colspan="2">Clear</div> <div class="key">\</div>

    <!-- Row 3 -->
    <div class="key caps">⇪</div>
    <div class="key">a</div> <div class="key">s</div> <div class="key">d</div> <div class="key">f</div> <div class="key">g</div> <div class="key">h</div> <div class="key">j</div> <div class="key">k</div> <div class="key">l</div>
    <div class="key">;</div> <div class="key">'</div> <div class="key">/</div>

    <!-- Row 4 -->
    <div class="key caps">⇧</div>
    <div class="key">z</div> <div class="key">x</div> <div class="key">c</div> <div class="key">v</div> <div class="key">b</div> <div class="key">n</div> <div class="key">m</div>
    <div class="key">,</div> <div class="key">.</div> <div class="key">?</div> <div class="key">!</div> <div class="key">@</div>

    <!-- Row 5 (Action Row) -->
    <div class="key action-cancel">Cancel</div>
    <div class="key">Sym</div>
    <div class="key space">Space</div>
    <div class="key">←</div>
    <div class="key">→</div>
    <div class="key action-done">Done</div>
  </div>

</div>

<script>
  const keys = document.querySelectorAll('.key');
  const suggestions = document.querySelectorAll('.suggestion');
  const inputTextEl = document.getElementById('input-text');
  const dialogWindow = document.getElementById('dialog-window');
  const inputWrapper = document.getElementById('text-input');

  // Helper to remove focus from everything
  function clearAllFocus() {
    keys.forEach(k => k.classList.remove('focused'));
    suggestions.forEach(s => s.classList.remove('focused'));
    inputWrapper.classList.remove('active-typing');
  }

  // Handle Autocomplete Suggestions
  suggestions.forEach(suggestion => {
    suggestion.addEventListener('mouseover', () => {
      clearAllFocus();
      suggestion.classList.add('focused');
    });

    suggestion.addEventListener('click', () => {
      // Auto-fill input text
      inputTextEl.innerText = suggestion.innerText;

      // Flash input border green/yellow to indicate selection
      inputWrapper.style.borderColor = 'var(--accent-green)';
      setTimeout(() => { inputWrapper.style.borderColor = 'transparent'; }, 400);
    });
  });

  // Handle Keyboard Grid
  keys.forEach(key => {
    key.addEventListener('mouseover', () => {
      clearAllFocus();
      key.classList.add('focused');
      inputWrapper.classList.add('active-typing'); // Show input is active
    });

    key.addEventListener('click', () => {
      let currentText = inputTextEl.innerText;
      const keyText = key.innerText;

      // Handle special keys
      if (keyText === '⌫') {
        inputTextEl.innerText = currentText.slice(0, -1);
      }
      else if (keyText === 'Clear') {
        inputTextEl.innerText = '';
      }
      else if (keyText === 'Space') {
        inputTextEl.innerText += ' ';
      }
      else if (keyText === 'Cancel' || keyText === 'Done') {
        // Simulate closing the dialog
        dialogWindow.style.opacity = '0';
        dialogWindow.style.transform = 'translate(-50%, -45%) scale(0.95)';
        setTimeout(() => {
          alert(keyText === 'Done' ? `Saved: "${inputTextEl.innerText}"` : 'Action Cancelled');
          // Reset for demo
          dialogWindow.style.opacity = '1';
          dialogWindow.style.transform = 'translate(-50%, -50%) scale(1)';
        }, 300);
      }
      // Handle normal character input
      else if (keyText.length === 1) {
        inputTextEl.innerText = currentText + keyText;
      }
    });
  });
</script>

</body>
</html>
